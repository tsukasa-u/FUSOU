name: FUSOU-WEB Simulator E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - packages/FUSOU-WEB/**
      - packages/shared-ui/**
      - pnpm-lock.yaml
      - .github/workflows/fusou-web-e2e-simulator.yml

jobs:
  simulator-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:4401
      PLAYWRIGHT_REUSE_SERVER: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --dir packages/FUSOU-WEB exec playwright install --with-deps chromium

      - name: Run simulator E2E
        run: pnpm --dir packages/FUSOU-WEB run e2e:simulator:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fusou-web-simulator
          path: packages/FUSOU-WEB/playwright-report
          if-no-files-found: ignore
