name: Trigger Daily Compaction

on:
  schedule:
    # Daily at 02:00 UTC (11:00 JST)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  trigger-compaction:
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled compaction
        run: |
          BASE_URL="${{ secrets.FUSOU_WEB_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            echo "FUSOU_WEB_BASE_URL secret is not set"
            exit 1
          fi
          BASE_URL="${BASE_URL%/}"
          curl -X POST "${BASE_URL}/api/compaction/trigger-scheduled" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            -s -S
        continue-on-error: false

      - name: Check result
        if: failure()
        run: echo "Failed to trigger compaction. Check the logs above."
