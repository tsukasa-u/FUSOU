name: Publish fusou-datasets to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use pyproject.toml version)'
        required: false
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        working-directory: packages/fusou-datasets/python
        run: python -m build

      - name: Check package
        working-directory: packages/fusou-datasets/python
        run: twine check dist/*

      - name: Publish to PyPI
        working-directory: packages/fusou-datasets/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  test-install:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Wait for PyPI
        run: sleep 60

      - name: Test install from PyPI
        run: |
          pip install fusou-datasets
          python -c "import fusou_datasets; print(f'Installed version: {fusou_datasets.__version__}')"
