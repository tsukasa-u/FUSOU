[package]
name = "kc-api"
version.workspace = true
edition.workspace = true
license.workspace = true
build = "build.rs"

[dependencies]
kc-api-interface = { workspace = true, default-features = false }
kc-api-interface-adapter = { workspace = true, default-features = false }
kc-api-database = { workspace = true }
kc-api-dto = { workspace = true, default-features = false }
kc-api-parser = { workspace = true, default-features = false }
kc-fleet-snapshot = { workspace = true, default-features = false }

[build-dependencies]
kc-api-build-config = { path = "../kc-api-build-config" }

[features]
default = ["graphviz", "genesis", "schema_v0_5_1"]
full = ["kc-api-database/full"]
graphviz = [
    "kc-api-database/graphviz",
    "kc-api-dto/graphviz",
]
cytoscape = [
    "kc-api-database/cytoscape",
    "kc-api-dto/cytoscape",
]
genesis = [
    "kc-api-database/genesis",
    "kc-api-interface/genesis",
    "kc-api-interface-adapter/genesis",
    "kc-api-dto/genesis",
    "kc-api-parser/genesis",
    "kc-fleet-snapshot/genesis",
]
epoch_20250627 = [
    "kc-api-database/epoch_20250627",
    "kc-api-interface/epoch_20250627",
    "kc-api-interface-adapter/epoch_20250627",
    "kc-api-dto/epoch_20250627",
    "kc-api-parser/epoch_20250627",
    "kc-fleet-snapshot/epoch_20250627",
]

# Schema version features - names match table_version values (0.4, 0.5, 0.6)
schema_v0_4 = ["kc-api-database/schema_v0_4"]
schema_v0_5 = ["kc-api-database/schema_v0_5"]
schema_v0_5_1 = ["kc-api-database/schema_v0_5_1"]
