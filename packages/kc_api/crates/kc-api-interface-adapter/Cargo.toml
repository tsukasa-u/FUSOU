[package]
name = "kc-api-interface-adapter"
version.workspace = true
edition.workspace = true
license.workspace = true
build = "build.rs"

[dependencies]
chrono = { workspace = true }
once_cell = { workspace = true }
register_trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
ts-rs = { workspace = true }
apache-avro = { workspace = true }
kc-api-interface = { workspace = true, default-features = false }
kc-api-dto = { workspace = true, default-features = false }
sha2 = { workspace = true }
rand = "0.8"

[build-dependencies]
kc-api-build-config = { path = "../kc-api-build-config" }

[features]
default = [ "genesis" ]

genesis = [
	"kc-api-interface/genesis",
	"kc-api-dto/genesis",
]
epoch_20250627 = [
	"kc-api-interface/epoch_20250627",
	"kc-api-dto/epoch_20250627",
]
