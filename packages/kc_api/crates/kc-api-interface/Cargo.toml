[package]
name = "kc-api-interface"
version.workspace = true
edition.workspace = true
license.workspace = true
build = "build.rs"

[dependencies]
chrono = { workspace = true }
once_cell = { workspace = true }
register_trait = { workspace = true }
serde = { workspace = true }
ts-rs = { workspace = true }
# Use minimal apache-avro config for WASM compatibility
# zstandard can be enabled via feature flag for native builds
apache-avro = { version = "0.19", default-features = false, features = ["snappy", "derive"] }

[build-dependencies]
kc-api-build-config = { path = "../kc-api-build-config" }

[features]
default = [ "genesis" ]
genesis = []
epoch_20250627 = []
# Enable zstandard for native builds
zstandard = ["apache-avro/zstandard"]

[dev-dependencies]
serde_json = { workspace = true }