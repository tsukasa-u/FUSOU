name = "fusou-url-shorter"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]
main = "src/index.ts"

# ===== Custom Domain =====
# Requires: DNS CNAME record  s.fusou.dev → fusou-url-shorter.<account>.workers.dev
# Add the CNAME in Cloudflare DNS dashboard, then uncomment below:
# [routes]
# route = "s.fusou.dev/*"
# zone_name = "fusou.dev"

# ===== KV Namespace Bindings =====
# Create KV namespace with:
#   npx wrangler kv namespace create URL_KV
# Then replace the id below with the actual id.
[[kv_namespaces]]
binding = "URL_KV"
id = "31a07cd58974448597868e98668a23b1"

# For local development, wrangler dev uses a local KV store automatically.

# ===== Environment Variables =====
# Set ALLOWED_ORIGINS in Cloudflare dashboard for production.
# Comma-separated list of allowed origins.
# Example: "https://fusou.pages.dev,https://dev.fusou.pages.dev,https://view-on-web.fusou.pages.dev"
[vars]
ALLOWED_ORIGINS = "https://fusou.dev,https://www.fusou.dev,https://s.fusou.dev,https://fusou.pages.dev,https://*.fusou.pages.dev"
# OGP image used for link previews (recommend PNG/JPG/WebP for Twitter/X compatibility)
OGP_IMAGE_URL = "https://fusou.dev/favicon.svg"

# For local development, override ALLOWED_ORIGINS in [env.dev] or via --var flag:
#   npx wrangler dev --var ALLOWED_ORIGINS:http://localhost:4321
