name = "fusou-workflow"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

# Main entry point - wrangler will build with esbuild automatically
main = "src/index.ts"

# Run scheduled compaction hourly (UTC). Adjust as needed.
[triggers]
crons = ["0 * * * *"]

# ===== Environment Variables =====
# All configuration is now via D1 database
# Previous Supabase credentials have been removed

# ===== R2 bucket bindings =====
[[r2_buckets]]
binding = "BATTLE_DATA_BUCKET"
bucket_name = "dev-kc-battle-data"
# location = "apac"  # Optional: Hint for primary location (Asia-Pacific for Japanese users)

# ===== Queue bindings =====
# Consumer: receives from main queue
[[queues.consumers]]
queue = "dev-kc-compaction-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "dev-kc-compaction-dlq"

# Producer binding used by /ingest and /battle-data/upload
[[queues.producers]]
queue = "dev-kc-compaction-queue"
binding = "COMPACTION_QUEUE"

# DLQ Handler: processes failed messages
[[queues.consumers]]
queue = "dev-kc-compaction-dlq"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 1

# ===== CPU limit: 5 minutes per step =====
[limits]
cpu_ms = 300000

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# ===== D1 database bindings =====
[[ d1_databases ]]
binding = "BATTLE_INDEX_DB"
database_name = "dev_kc_battle_index"
database_id = "700f4191-f93c-4db4-873d-d5fee9a901e3"

[[ d1_databases ]]
binding = "QUEST_INDEX_DB"
database_name = "dev-kc-quest-index"
database_id = "f6d4f2c0-e48b-4539-bd9e-28ab46cdbfb8"

# Optional KV binding for hot-read cost optimization.
# During cron processing only, reader includes buffer_logs_processing.
# [[kv_namespaces]]
# binding = "WORKFLOW_STATE_KV"
# id = "091373317ad84defb7e2c66f49f2cbad"

## Environment Variables
# Do NOT hardcode variables here.
# - Development: use dotenvx with `.env`
# - Production: configure in Cloudflare Dashboard → Settings → Environment Variables
# ===== WASM Module Rules =====
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# ===== Turso Configuration =====
# Turso serverless for hot buffer tables
# Secrets required:
#   wrangler secret put TURSO_DATABASE_URL
#   wrangler secret put TURSO_AUTH_TOKEN
