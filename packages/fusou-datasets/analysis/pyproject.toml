[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "fusou-formula"
version = "0.2.0"
description = "Black-box mathematical model extraction pipeline — no domain knowledge assumptions"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "FUSOU Team" }]

dependencies = [
    "fusou-datasets>=0.1.1",
    "numpy>=1.24",
    "pandas>=1.5",
    "sympy>=1.12",
    "pysr>=0.19",
    "ruptures>=1.1",
    "matplotlib>=3.6",
    "scikit-learn>=1.2",
    "scipy>=1.10",
    "requests>=2.25",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
fusou-formula = "fusou_formula:main"

[tool.setuptools.packages.find]
include = ["fusou_formula*"]
