[package]
name = "fusou-storage"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[features]
default = ["kc-api-epoch-20250627"]
gdrive = ["dep:google-drive3", "dep:rustls", "configs/gdrive"]
kc-api-epoch-genesis = ["kc_api/genesis"]
kc-api-epoch-20250627 = ["kc_api/epoch_20250627"]

[dependencies]
dirs = "5.0.1"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.38.0", features = ["full"] }
kc_api = { package = "kc-api", path = "../kc_api/crates/kc-api", default-features = false, features = ["full", "graphviz", "schema_v0_5"] }
fusou-auth = { path = "../fusou-auth" }
fusou-upload = { path = "../fusou-upload" }
configs = { path = "../configs" }
chrono = "0.4.31"
chrono-tz = "0.10.0"
once_cell = "1.21.3"
uuid = { version = "1.16.0", features = ["v4"] }
http-body-util = "0.1.2"
tracing = "0.1.41"
reqwest = { version = "0.12.5", default-features = false, features = ["json", "rustls-tls"] }
rand = "0.8"
sha2 = "0.10"
hex = "0.4"
cap-std = "3"
google-drive3 = { version = "=6.0.0", optional = true }
rustls = { version = "0.23.26", features = ["ring"], optional = true }
